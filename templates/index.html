<!DOCTYPE html>
<html>
<head>
<title>Suspicious Activity Detection</title>
</head>

<body>

<h2>Suspicious Activity Detection System</h2>

<form action="/predict" method="post" enctype="multipart/form-data">

<label>Upload Image / Frame</label><br><br>

<input type="file" name="file" required>

<br><br>

<button type="submit">Detect Activity</button>

</form>

{% if prediction %}
<h3>Result: {{ prediction }}</h3>
{% endif %}

</body>
</html>
